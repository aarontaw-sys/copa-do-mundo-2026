<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo FIFA 2026 вЂ” Fase de Grupos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060c;--bg2:#0c0c16;--card:#10101c;--card2:#161625;
  --border:#1a1a30;--border2:#252545;
  --text:#556;--text2:#889;--text-hi:#eef;
  --accent:#8b5cf6;--accent2:#06b6d4;
  --glow:rgba(139,92,246,0.5);
  --r:8px;
}
html,body{height:100vh;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:11px;line-height:1.35}

/* PAGE LAYOUT: full viewport grid */
.page{display:grid;height:100vh;width:100vw;
  grid-template-rows:auto 1fr auto;
  grid-template-areas:"header" "main" "filters";
  gap:0;padding:4px 6px}

/* HEADER */
.header{grid-area:header;display:flex;align-items:center;justify-content:space-between;
  padding:3px 8px;min-height:0}
.header-left{display:flex;align-items:center;gap:8px}
.header h1{font-size:13px;font-weight:700;letter-spacing:-.02em;
  background:linear-gradient(135deg,#a78bfa,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.header-stats{display:flex;gap:10px;align-items:center}
.hstat{text-align:center;line-height:1.1}
.hstat b{font-size:12px;color:var(--text-hi);display:block}
.hstat small{font-size:7px;text-transform:uppercase;letter-spacing:.06em;color:var(--text);opacity:.6}
.header-hint{font-size:7.5px;color:var(--text);opacity:.5;white-space:nowrap}
.net-toggle{padding:2px 8px;border:1px solid var(--border);border-radius:12px;
  font-size:8px;color:var(--text);cursor:default;transition:all .25s ease;background:var(--card)}
.net-toggle:hover{border-color:var(--accent);color:var(--text-hi);box-shadow:0 0 10px var(--glow)}
.net-toggle.active{border-color:var(--accent);color:var(--accent)}

/* MAIN GROUPS GRID */
.main{grid-area:main;display:grid;grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(3,1fr);gap:4px;min-height:0;overflow:hidden}

/* GROUP CARD */
.group-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
  transition:all .25s ease;position:relative}
.group-card.highlighted{border-color:var(--accent)!important;
  box-shadow:0 0 20px var(--glow)!important;z-index:5;transform:scale(1.01)}
.group-card.dimmed{opacity:.12!important;filter:blur(0.5px)!important}

/* GROUP HEADER */
.gh{display:flex;align-items:center;justify-content:space-between;
  padding:3px 6px 2px;border-bottom:1px solid var(--border);flex-shrink:0}
.gl{font-size:10px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gt{font-size:6px;color:var(--text);opacity:.3}

/* TEAMS ROW */
.tr{display:flex;flex-wrap:wrap;gap:2px;padding:2px 5px;flex-shrink:0}
.tb{display:inline-flex;align-items:center;gap:2px;
  padding:1px 4px;border-radius:4px;font-size:8px;font-weight:600;
  background:var(--card2);border:1px solid transparent;
  cursor:default;color:var(--text2);transition:all .25s ease;white-space:nowrap}
.tb.highlighted{color:var(--text-hi)!important;border-color:var(--accent)!important;
  background:rgba(139,92,246,0.15)!important;box-shadow:0 0 8px var(--glow)!important;
  transform:scale(1.15);z-index:10;position:relative}
.tb.dimmed{opacity:.12!important;filter:blur(0.5px)!important}
.tf{font-size:10px;line-height:1}

/* MATCHES LIST */
.ml{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:1px;padding:2px 4px 3px}
.mc{display:flex;align-items:center;gap:3px;padding:2px 4px;
  border-radius:4px;cursor:default;font-size:8px;
  background:var(--bg2);border-left:2px solid var(--city-color,var(--border));
  transition:all .25s ease;position:relative;min-height:0;flex-shrink:0}
.mc.highlighted{background:rgba(139,92,246,0.08)!important;
  border-left-color:var(--city-color,var(--accent))!important;
  box-shadow:0 0 10px rgba(139,92,246,0.15)!important;
  transform:scale(1.08);z-index:10;position:relative;
  color:var(--text-hi)!important}
.mc.dimmed{opacity:.12!important;filter:blur(0.5px)!important}
.mt{font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:2px}
.mt .f{font-size:9px}
.mv{color:var(--accent);font-size:7px;margin:0 1px}
.mm{margin-left:auto;display:flex;gap:4px;font-size:7px;color:var(--text);white-space:nowrap;flex-shrink:0}
.mm .ct{color:var(--city-color,var(--text));font-weight:600}

/* FILTERS BAR */
.filters{grid-area:filters;display:flex;gap:6px;align-items:flex-start;
  padding:3px 6px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);min-height:0;overflow:hidden;flex-wrap:nowrap}
.fs{display:flex;align-items:center;gap:3px;flex-shrink:0}
.fs:not(:last-child){border-right:1px solid var(--border);padding-right:6px}
.fl{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--accent);white-space:nowrap;flex-shrink:0}
.fc{display:flex;flex-wrap:wrap;gap:2px;align-items:center}
.ch{padding:1px 5px;border-radius:10px;font-size:7px;font-weight:500;
  border:1px solid var(--border);color:var(--text2);cursor:default;
  background:transparent;white-space:nowrap;transition:all .25s ease;position:relative}
.ch.cc{border-color:color-mix(in srgb,var(--city-color) 25%,var(--border));color:var(--city-color)}
.ch.sc{border-left:2px solid var(--city-color,var(--border));font-size:6.5px}
.ch.dc{min-width:24px;text-align:center;font-size:7px}
.ch.tc{font-family:'Courier New',monospace;font-weight:700;letter-spacing:.03em}
.ch.highlighted{border-color:var(--city-color,var(--accent))!important;
  color:var(--text-hi)!important;
  background:color-mix(in srgb,var(--city-color,var(--accent)) 12%,transparent)!important;
  box-shadow:0 0 8px color-mix(in srgb,var(--city-color,var(--accent)) 30%,transparent)!important;
  transform:scale(1.2);z-index:10;position:relative}
.ch.dimmed{opacity:.12!important;filter:blur(0.5px)!important}

/* NETWORK */
.network-overlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;
  background:rgba(6,6,12,0.95);z-index:100}
.network-overlay.visible{display:block}
.network-overlay canvas{width:100%;height:100%}
.net-legend{position:absolute;top:10px;right:10px;font-size:8px;color:var(--text);
  background:rgba(16,16,28,0.9);padding:6px 8px;border-radius:6px;border:1px solid var(--border)}
.net-legend div{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.ls{width:8px;height:8px;display:inline-block}
.lc{border-radius:50%}.lsq{border-radius:1px}.ld{transform:rotate(45deg)}
.net-close{position:absolute;top:10px;left:10px;font-size:9px;color:var(--text);
  padding:3px 10px;border:1px solid var(--border);border-radius:10px;cursor:default;
  transition:all .2s ease}
.net-close:hover{border-color:var(--accent);color:var(--text-hi)}

/* Global transition for data elements */
.data-el{transition:opacity .25s ease,filter .25s ease,transform .25s ease,
  box-shadow .25s ease,border-color .25s ease,background .25s ease,color .25s ease}

/* RESPONSIVE */
@media(max-width:1024px){
  .main{grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,1fr)}
  .page{overflow-y:auto}
}
@media(max-width:768px){
  .main{grid-template-columns:repeat(2,1fr);grid-template-rows:auto}
  .page{overflow-y:auto;height:auto}
  .net-toggle{display:none}
}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="header-left">
      <h1>вљЅ Copa do Mundo FIFA 2026</h1>
      <div class="header-stats">
        <div class="hstat"><b>48</b><small>SeleГ§Гµes</small></div>
        <div class="hstat"><b>12</b><small>Grupos</small></div>
        <div class="hstat"><b>72</b><small>Jogos</small></div>
        <div class="hstat"><b>16</b><small>EstГЎdios</small></div>
      </div>
    </div>
    <span class="header-hint">Hover para explorar conexГµes В· Sem cliques</span>
    <div class="net-toggle" id="netToggle">в—€ Network</div>
  </div>

  <div class="main" id="app"></div>

  <div class="filters" id="filtersBar"></div>
</div>

<!-- NETWORK OVERLAY -->
<div class="network-overlay" id="networkOverlay">
  <canvas id="networkCanvas"></canvas>
  <div class="net-close" id="netClose">вњ• Fechar</div>
  <div class="net-legend">
    <div><span class="ls lc" style="background:var(--accent)"></span> SeleГ§Гµes</div>
    <div><span class="ls lsq" style="background:var(--accent2)"></span> EstГЎdios</div>
    <div><span class="ls ld" style="background:#f59e0b"></span> Cidades</div>
  </div>
</div>

<script>
// ===================== DATA =====================
const GROUPS_DATA = {
  A:{teams:[{code:"USA",name:"EUA",flag:"рџ‡єрџ‡ё"},{code:"URU",name:"Uruguai",flag:"рџ‡єрџ‡ѕ"},{code:"SRB",name:"SГ©rvia",flag:"рџ‡·рџ‡ё"},{code:"GHA",name:"Gana",flag:"рџ‡¬рџ‡­"}]},
  B:{teams:[{code:"MEX",name:"MГ©xico",flag:"рџ‡Ірџ‡Ѕ"},{code:"COL",name:"ColГґmbia",flag:"рџ‡Ёрџ‡ґ"},{code:"AUT",name:"ГЃustria",flag:"рџ‡¦рџ‡№"},{code:"CIV",name:"C.Marfim",flag:"рџ‡Ёрџ‡®"}]},
  C:{teams:[{code:"CAN",name:"CanadГЎ",flag:"рџ‡Ёрџ‡¦"},{code:"CRO",name:"CroГЎcia",flag:"рџ‡­рџ‡·"},{code:"POL",name:"PolГґnia",flag:"рџ‡µрџ‡±"},{code:"ALG",name:"ArgГ©lia",flag:"рџ‡©рџ‡ї"}]},
  D:{teams:[{code:"BRA",name:"Brasil",flag:"рџ‡§рџ‡·"},{code:"ITA",name:"ItГЎlia",flag:"рџ‡®рџ‡№"},{code:"SWE",name:"SuГ©cia",flag:"рџ‡ёрџ‡Є"},{code:"QAT",name:"Catar",flag:"рџ‡¶рџ‡¦"}]},
  E:{teams:[{code:"ARG",name:"Argentina",flag:"рџ‡¦рџ‡·"},{code:"DEN",name:"Dinamarca",flag:"рџ‡©рџ‡°"},{code:"UKR",name:"UcrГўnia",flag:"рџ‡єрџ‡¦"},{code:"UZB",name:"UzbequistГЈo",flag:"рџ‡єрџ‡ї"}]},
  F:{teams:[{code:"FRA",name:"FranГ§a",flag:"рџ‡«рџ‡·"},{code:"JPN",name:"JapГЈo",flag:"рџ‡Їрџ‡µ"},{code:"NGA",name:"NigГ©ria",flag:"рџ‡ірџ‡¬"},{code:"IDN",name:"IndonГ©sia",flag:"рџ‡®рџ‡©"}]},
  G:{teams:[{code:"ESP",name:"Espanha",flag:"рџ‡Єрџ‡ё"},{code:"KOR",name:"Coreia",flag:"рџ‡°рџ‡·"},{code:"CMR",name:"CamarГµes",flag:"рџ‡Ёрџ‡І"},{code:"CRC",name:"Costa Rica",flag:"рџ‡Ёрџ‡·"}]},
  H:{teams:[{code:"ENG",name:"Inglaterra",flag:"рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї"},{code:"MAR",name:"Marrocos",flag:"рџ‡Ірџ‡¦"},{code:"EGY",name:"Egito",flag:"рџ‡Єрџ‡¬"},{code:"HON",name:"Honduras",flag:"рџ‡­рџ‡і"}]},
  I:{teams:[{code:"POR",name:"Portugal",flag:"рџ‡µрџ‡№"},{code:"SEN",name:"Senegal",flag:"рџ‡ёрџ‡і"},{code:"TUN",name:"TunГ­sia",flag:"рџ‡№рџ‡і"},{code:"PAN",name:"PanamГЎ",flag:"рџ‡µрџ‡¦"}]},
  J:{teams:[{code:"NED",name:"Holanda",flag:"рџ‡ірџ‡±"},{code:"ECU",name:"Equador",flag:"рџ‡Єрџ‡Ё"},{code:"IRN",name:"IrГЈ",flag:"рџ‡®рџ‡·"},{code:"JAM",name:"Jamaica",flag:"рџ‡Їрџ‡І"}]},
  K:{teams:[{code:"BEL",name:"BГ©lgica",flag:"рџ‡§рџ‡Є"},{code:"SUI",name:"SuГ­Г§a",flag:"рџ‡Ёрџ‡­"},{code:"AUS",name:"AustrГЎlia",flag:"рџ‡¦рџ‡є"},{code:"NZL",name:"N.ZelГўndia",flag:"рџ‡ірџ‡ї"}]},
  L:{teams:[{code:"GER",name:"Alemanha",flag:"рџ‡©рџ‡Є"},{code:"CHI",name:"Chile",flag:"рџ‡Ёрџ‡±"},{code:"KSA",name:"A.Saudita",flag:"рџ‡ёрџ‡¦"},{code:"PAR",name:"Paraguai",flag:"рџ‡µрџ‡ѕ"}]}
};

const CITY_COLORS={"east-rutherford":"#3b82f6","los-angeles":"#a855f7","dallas":"#f97316",
  "miami":"#06b6d4","houston":"#ef4444","atlanta":"#10b981","filadelfia":"#6366f1",
  "seattle":"#14b8a6","foxborough":"#ec4899","kansas-city":"#f59e0b","santa-clara":"#c084fc",
  "cidade-do-mexico":"#22c55e","guadalajara":"#e11d48","monterrey":"#0ea5e9",
  "vancouver":"#dc2626","toronto":"#d946ef"};

const VENUES=[
  {id:"metlife",name:"MetLife",city:"East Rutherford",country:"EUA"},
  {id:"sofi",name:"SoFi",city:"Los Angeles",country:"EUA"},
  {id:"att",name:"AT&T",city:"Dallas",country:"EUA"},
  {id:"hardrock",name:"Hard Rock",city:"Miami",country:"EUA"},
  {id:"nrg",name:"NRG",city:"Houston",country:"EUA"},
  {id:"mercedesbenz",name:"Mercedes-Benz",city:"Atlanta",country:"EUA"},
  {id:"lincoln",name:"Lincoln Field",city:"FiladГ©lfia",country:"EUA"},
  {id:"lumen",name:"Lumen Field",city:"Seattle",country:"EUA"},
  {id:"gillette",name:"Gillette",city:"Foxborough",country:"EUA"},
  {id:"arrowhead",name:"Arrowhead",city:"Kansas City",country:"EUA"},
  {id:"levis",name:"Levi's",city:"Santa Clara",country:"EUA"},
  {id:"azteca",name:"Azteca",city:"Cidade do MГ©xico",country:"MX"},
  {id:"akron",name:"Akron",city:"Guadalajara",country:"MX"},
  {id:"bbva",name:"BBVA",city:"Monterrey",country:"MX"},
  {id:"bcplace",name:"BC Place",city:"Vancouver",country:"CA"},
  {id:"bmo",name:"BMO Field",city:"Toronto",country:"CA"}
];

function slug(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-")}
function cc(cs){return CITY_COLORS[cs]||"#556"}

const MATCHES=[];
(function(){
  const sched=[
    {g:["A","B"],d:["2026-06-11","2026-06-17","2026-06-23"]},
    {g:["C","D"],d:["2026-06-12","2026-06-18","2026-06-24"]},
    {g:["E","F"],d:["2026-06-13","2026-06-19","2026-06-25"]},
    {g:["G","H"],d:["2026-06-14","2026-06-20","2026-06-26"]},
    {g:["I","J"],d:["2026-06-15","2026-06-21","2026-06-27"]},
    {g:["K","L"],d:["2026-06-16","2026-06-22","2026-06-28"]}
  ];
  const times=["13:00","16:00","19:00","22:00"];
  let vi=0;
  sched.forEach(s=>{s.g.forEach((gk,gi)=>{
    const t=GROUPS_DATA[gk].teams;
    [[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]].forEach((md,mdi)=>{
      md.forEach((p,pi)=>{
        const v=VENUES[vi%VENUES.length];vi++;
        MATCHES.push({group:gk,t1:t[p[0]].code,f1:t[p[0]].flag,t2:t[p[1]].code,f2:t[p[1]].flag,
          date:s.d[mdi],time:times[(gi*2+pi)%4],
          stad:v.id,stadName:v.name,city:v.city,cs:slug(v.city)});
      });
    });
  });});
})();

// ===================== RENDER =====================
const MO=["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
function fd(d){const p=d.split("-");return parseInt(p[2])+" "+MO[parseInt(p[1])];}

function render(){
  const app=document.getElementById("app");
  let h="";
  Object.entries(GROUPS_DATA).forEach(([gk,g])=>{
    const gm=MATCHES.filter(m=>m.group===gk);
    const tc=g.teams.map(t=>t.code).join(",");
    h+=`<div class="group-card data-el" data-group="${gk}" data-teams="${tc}">`;
    h+=`<div class="gh"><span class="gl">Grupo ${gk}</span><span class="gt">TBC</span></div>`;
    h+=`<div class="tr">`;
    g.teams.forEach(t=>{
      h+=`<div class="tb data-el" data-teams="${t.code}" data-group="${gk}"><span class="tf">${t.flag}</span>${t.name}</div>`;
    });
    h+=`</div><div class="ml">`;
    gm.forEach(m=>{
      const c=cc(m.cs);
      h+=`<div class="mc data-el" style="--city-color:${c}"
        data-teams="${m.t1},${m.t2}" data-group="${m.group}"
        data-stadium="${m.stad}" data-city="${m.cs}"
        data-date="${m.date}" data-time="${m.time}">
        <div class="mt"><span class="f">${m.f1}</span>${m.t1}<span class="mv">Г—</span>${m.t2}<span class="f">${m.f2}</span></div>
        <div class="mm"><span>${fd(m.date)}</span><span>${m.time}</span><span class="ct" style="--city-color:${c}">${m.stadName}</span></div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  app.innerHTML=h;
}

function renderFilters(){
  const bar=document.getElementById("filtersBar");
  const cities=[...new Set(MATCHES.map(m=>m.city))];
  const dates=[...new Set(MATCHES.map(m=>m.date))].sort();
  const stadiums=[...new Set(MATCHES.map(m=>m.stad))];
  const times=[...new Set(MATCHES.map(m=>m.time))].sort();

  let h=`<div class="fs"><span class="fl">рџ“Ќ Cidades</span><div class="fc">`;
  cities.forEach(c=>{const cs=slug(c),col=cc(cs);
    h+=`<div class="ch cc data-el" data-city="${cs}" style="--city-color:${col}">${c}</div>`;
  });
  h+=`</div></div>`;

  h+=`<div class="fs"><span class="fl">рџЏџ EstГЎdios</span><div class="fc">`;
  stadiums.forEach(s=>{const v=VENUES.find(x=>x.id===s);const cs=slug(v.city),col=cc(cs);
    h+=`<div class="ch sc data-el" data-stadium="${s}" data-city="${cs}" style="--city-color:${col}">${v.name}</div>`;
  });
  h+=`</div></div>`;

  h+=`<div class="fs"><span class="fl">рџ“…</span><div class="fc">`;
  dates.forEach(d=>{const p=d.split("-");
    h+=`<div class="ch dc data-el" data-date="${d}">${parseInt(p[2])}/${p[1].slice(1)}</div>`;
  });
  h+=`</div></div>`;

  h+=`<div class="fs"><span class="fl">рџ•ђ</span><div class="fc">`;
  times.forEach(t=>{
    h+=`<div class="ch tc data-el" data-time="${t}">${t}</div>`;
  });
  h+=`</div></div>`;

  bar.innerHTML=h;
}

// ===================== HIGHLIGHT SYSTEM =====================
function setupHighlight(){
  const app=document.getElementById("app");
  const fb=document.getElementById("filtersBar");
  const root=document.querySelector(".page");
  const AS=["data-teams","data-group","data-stadium","data-city","data-date","data-time"];

  function gA(el){const r={};AS.forEach(a=>{const v=el.getAttribute(a);if(v)r[a]=v;});return r;}
  function ovr(a,b){for(const k in b){const v=a[k];if(!v)continue;
    if(k==="data-teams"){if(b[k].split(",").some(t=>v.split(",").includes(t)))return true;}
    else if(v===b[k])return true;}return false;}

  function expand(ha){
    const hT=ha["data-teams"]?ha["data-teams"].split(","):[];
    const hS=ha["data-stadium"]||null,hC=ha["data-city"]||null;
    const hD=ha["data-date"]||null,hTi=ha["data-time"]||null,hG=ha["data-group"]||null;
    const isMatch=hT.length>0&&hS&&hD;
    const isTeam=hT.length>0&&hT.length<=2&&!hS&&!hD;
    const isGroup=hG&&hT.length>2;
    const isVenue=(hS||hC)&&hT.length===0;
    const isDate=hD&&hT.length===0&&!hS;
    const isTime=hTi&&hT.length===0&&!hS&&!hD;
    let rm;
    if(isMatch) rm=MATCHES.filter(m=>m.stad===hS&&m.date===hD&&m.time===hTi&&hT.some(t=>m.t1===t||m.t2===t));
    else if(isTeam) rm=MATCHES.filter(m=>hT.some(t=>m.t1===t||m.t2===t));
    else if(isGroup) rm=MATCHES.filter(m=>m.group===hG);
    else if(isVenue&&hS) rm=MATCHES.filter(m=>m.stad===hS);
    else if(isVenue&&hC) rm=MATCHES.filter(m=>m.cs===hC);
    else if(isDate) rm=MATCHES.filter(m=>m.date===hD);
    else if(isTime) rm=MATCHES.filter(m=>m.time===hTi);
    else rm=MATCHES.filter(m=>ovr({"data-teams":m.t1+","+m.t2,"data-group":m.group,"data-stadium":m.stad,"data-city":m.cs,"data-date":m.date,"data-time":m.time},ha));

    const e={teams:new Set(hT),stads:new Set(hS?[hS]:[]),cities:new Set(hC?[hC]:[]),
      dates:new Set(hD?[hD]:[]),times:new Set(hTi?[hTi]:[]),groups:new Set(hG?[hG]:[]),sigs:new Set()};
    rm.forEach(m=>{e.teams.add(m.t1);e.teams.add(m.t2);e.stads.add(m.stad);e.cities.add(m.cs);
      e.dates.add(m.date);e.times.add(m.time);e.groups.add(m.group);
      e.sigs.add(`${m.t1},${m.t2}|${m.stad}|${m.date}|${m.time}`);});
    return e;
  }

  function isRel(ea,ex){
    const isMC=ea["data-teams"]&&ea["data-stadium"]&&ea["data-date"];
    const isTB=ea["data-teams"]&&!ea["data-stadium"]&&!ea["data-date"];
    const isGC=ea["data-group"]&&ea["data-teams"]&&ea["data-teams"].split(",").length>2;
    if(isMC) return ex.sigs.has(`${ea["data-teams"]}|${ea["data-stadium"]}|${ea["data-date"]}|${ea["data-time"]}`);
    if(isGC) return ex.groups.has(ea["data-group"]);
    if(isTB) return ea["data-teams"].split(",").some(t=>ex.teams.has(t));
    if(ea["data-stadium"]&&ex.stads.has(ea["data-stadium"])) return true;
    if(ea["data-city"]&&ex.cities.has(ea["data-city"])) return true;
    if(ea["data-date"]&&ex.dates.has(ea["data-date"])) return true;
    if(ea["data-time"]&&ex.times.has(ea["data-time"])) return true;
    return false;
  }

  let cur=null,raf=null;
  function doHL(target){
    const el=target.closest(".data-el");
    if(!el){clr();return;}
    if(el===cur)return;
    cur=el;
    if(raf)cancelAnimationFrame(raf);
    raf=requestAnimationFrame(()=>{
      const ha=gA(el);
      const ex=expand(ha);
      root.querySelectorAll(".data-el").forEach(e=>{
        const ea=gA(e);
        if(isRel(ea,ex)){e.classList.add("highlighted");e.classList.remove("dimmed");}
        else{e.classList.add("dimmed");e.classList.remove("highlighted");}
      });
    });
  }
  function clr(){
    cur=null;if(raf)cancelAnimationFrame(raf);
    raf=requestAnimationFrame(()=>{
      root.querySelectorAll(".data-el").forEach(e=>e.classList.remove("highlighted","dimmed"));
    });
  }

  root.addEventListener("mouseover",e=>doHL(e.target));
  root.addEventListener("mouseleave",clr);
  root.addEventListener("touchstart",e=>doHL(e.target),{passive:true});
  document.addEventListener("touchstart",e=>{if(!root.contains(e.target))clr();},{passive:true});
}

// ===================== NETWORK =====================
function setupNetwork(){
  const toggle=document.getElementById("netToggle");
  const overlay=document.getElementById("networkOverlay");
  const close=document.getElementById("netClose");
  const canvas=document.getElementById("networkCanvas");
  const ctx=canvas.getContext("2d");
  let active=false,nodes=[],edges=[],hov=null;

  function show(){
    active=true;toggle.classList.add("active");overlay.classList.add("visible");
    resize();build();draw();
  }
  function hide(){active=false;toggle.classList.remove("active");overlay.classList.remove("visible");}

  let tt=null;
  toggle.addEventListener("mouseenter",()=>{tt=setTimeout(show,400);});
  toggle.addEventListener("mouseleave",()=>{if(tt){clearTimeout(tt);tt=null;}});
  close.addEventListener("mouseenter",()=>{setTimeout(hide,300);});

  function resize(){
    const dpr=window.devicePixelRatio||1;
    canvas.width=window.innerWidth*dpr;canvas.height=window.innerHeight*dpr;
    canvas.style.width=window.innerWidth+"px";canvas.style.height=window.innerHeight+"px";
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function build(){
    nodes=[];edges=[];
    const W=window.innerWidth,H=window.innerHeight,cx=W/2,cy=H/2;
    const tp={},sp={};
    const gks=Object.keys(GROUPS_DATA);
    gks.forEach((gk,gi)=>{
      const ga=(gi/gks.length)*Math.PI*2-Math.PI/2;
      const gcx=cx+Math.cos(ga)*Math.min(W,H)*0.34;
      const gcy=cy+Math.sin(ga)*H*0.34;
      GROUPS_DATA[gk].teams.forEach((t,ti)=>{
        const a=ga+(ti-1.5)*0.25,r=Math.min(W,H)*0.06;
        nodes.push({type:"team",id:t.code,label:t.flag+" "+t.code,
          x:gcx+Math.cos(a+ti*.35)*r,y:gcy+Math.sin(a+ti*.35)*r,group:gk});
        tp[t.code]=nodes.length-1;
      });
    });
    const us=new Set();let si=0;
    const pa=[0.2,1.1,2.3,3.0,3.8,4.5,5.2,0.7,1.6,2.8,3.5,4.1,5.0,5.8,0.4,1.9];
    MATCHES.forEach(m=>{
      if(us.has(m.stad))return;us.add(m.stad);
      const a=pa[si%pa.length];si++;const d=Math.min(W,H)*0.16;
      nodes.push({type:"stadium",id:m.stad,label:m.stadName,
        x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,color:cc(m.cs)});
      sp[m.stad]=nodes.length-1;
    });
    for(let i=0;i<100;i++){for(let a=0;a<nodes.length;a++){for(let b=a+1;b<nodes.length;b++){
      const n=nodes[a],m=nodes[b],dx=m.x-n.x,dy=m.y-n.y;
      const dist=Math.sqrt(dx*dx+dy*dy)||1,min=n.type==="team"&&m.type==="team"?45:35;
      if(dist<min){const f=(min-dist)*.25,fx=dx/dist*f,fy=dy/dist*f;
        n.x-=fx;n.y-=fy;m.x+=fx;m.y+=fy;}
    }nodes[a].x=Math.max(40,Math.min(W-40,nodes[a].x));
      nodes[a].y=Math.max(40,Math.min(H-40,nodes[a].y));}}
    MATCHES.forEach(m=>{const s=sp[m.stad],t1=tp[m.t1],t2=tp[m.t2];const col=cc(m.cs);
      if(s!==undefined&&t1!==undefined)edges.push({from:t1,to:s,teams:`${m.t1},${m.t2}`,stad:m.stad,color:col});
      if(s!==undefined&&t2!==undefined)edges.push({from:t2,to:s,teams:`${m.t1},${m.t2}`,stad:m.stad,color:col});
    });
  }

  canvas.addEventListener("mousemove",e=>{
    const mx=e.clientX,my=e.clientY;hov=null;
    for(const n of nodes){if(Math.hypot(n.x-mx,n.y-my)<18){hov=n;break;}}
    if(active)draw();
  });
  canvas.addEventListener("mouseleave",()=>{hov=null;if(active)draw();});

  function eRel(edge){if(!hov)return false;
    if(hov.type==="team")return edge.teams.split(",").includes(hov.id);
    if(hov.type==="stadium")return edge.stad===hov.id;return false;}

  function draw(){
    const W=window.innerWidth,H=window.innerHeight;ctx.clearRect(0,0,W,H);
    edges.forEach(e=>{const f=nodes[e.from],t=nodes[e.to];const rel=hov&&eRel(e);
      ctx.beginPath();ctx.moveTo(f.x,f.y);ctx.lineTo(t.x,t.y);
      ctx.strokeStyle=rel?e.color+"99":`rgba(100,100,150,${hov?0.02:0.08})`;
      ctx.lineWidth=rel?2:0.5;ctx.stroke();});
    nodes.forEach(n=>{const conn=!hov||n===hov||edges.some(e=>eRel(e)&&(nodes[e.from]===n||nodes[e.to]===n));
      const a=hov?(conn?1:0.06):0.8;let sz=n.type==="team"?14:10;
      if(hov&&n===hov)sz+=5;else if(hov&&conn)sz+=2;
      ctx.globalAlpha=a;
      if(n.type==="team"){ctx.beginPath();ctx.arc(n.x,n.y,sz,0,Math.PI*2);
        ctx.fillStyle="#8b5cf6";ctx.fill();ctx.font=`${Math.max(8,sz*.7)}px system-ui`;
        ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="#fff";ctx.fillText(n.label,n.x,n.y);
      }else{ctx.fillStyle=n.color||"#06b6d4";ctx.fillRect(n.x-sz/2,n.y-sz/2,sz,sz);}
      if(a>.3){ctx.font="9px system-ui";ctx.textAlign="center";
        ctx.fillStyle=`rgba(200,210,230,${a})`;ctx.fillText(n.label,n.x,n.y+sz+10);}
      ctx.globalAlpha=1;});
    if(hov){ctx.font="bold 12px system-ui";ctx.fillStyle="#fff";ctx.textAlign="left";ctx.fillText(hov.label,12,H-12);}
  }
  window.addEventListener("resize",()=>{if(active){resize();build();draw();}});
}

// ===================== INIT =====================
render();
renderFilters();
setupHighlight();
setupNetwork();
</script>
