<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copa do Mundo FIFA 2026 — Explorador Interativo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06060c;--bg2:#0c0c16;--card:#10101c;--card2:#161625;
  --border:#1a1a30;--border2:#252545;
  --text:#667;--text2:#99a;--text-hi:#eef;
  --accent:#8b5cf6;--accent2:#06b6d4;
  --glow:rgba(139,92,246,0.4);
  --r:10px;
}
html,body{height:100vh;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;line-height:1.4}

/* ===== MAIN GRID ===== */
.app{display:grid;height:100vh;width:100vw;
  grid-template-rows:auto 1fr auto;
  grid-template-columns:minmax(260px,1fr) 2.5fr minmax(200px,240px);
  grid-template-areas:
    "header header header"
    "teams  stage  sidebar"
    "venues venues venues";
  gap:6px;padding:6px 10px}

/* ===== HEADER ===== */
.header{grid-area:header;display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px}
.header h1{font-size:16px;font-weight:700;
  background:linear-gradient(135deg,#a78bfa,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-stats{display:flex;gap:16px;align-items:center}
.hstat{display:flex;align-items:baseline;gap:3px}
.hstat b{font-size:15px;color:var(--text-hi)}
.hstat small{font-size:8px;text-transform:uppercase;letter-spacing:.06em;color:var(--text);opacity:.6}
.header-hint{font-size:9px;color:var(--text);opacity:.35;font-style:italic}

/* ===== TEAMS PANEL (left) ===== */
.teams-panel{grid-area:teams;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:8px;overflow:visible;display:flex;flex-direction:column}
.panel-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--accent);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.teams-grid{display:grid;grid-template-columns:20px repeat(4,1fr);gap:0 4px;
  align-content:space-evenly;overflow:visible;height:100%}
.tgl{font-size:10px;font-weight:700;color:var(--accent);opacity:.4;
  display:flex;align-items:center;justify-content:center;
  cursor:default;transition:all .25s ease;border-radius:4px}
.tgl:hover,.tgl.highlighted{opacity:1;background:rgba(139,92,246,0.1)}
.tgl.dimmed{opacity:.08}
.ti{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:6px;
  cursor:default;transition:all .25s ease;font-size:10px;color:var(--text2);
  border:1px solid transparent;white-space:nowrap;overflow:hidden}
.ti:hover,.ti.highlighted{color:var(--text-hi);background:rgba(139,92,246,0.15);
  border-color:var(--accent);transform:scale(1.12);z-index:10;position:relative;
  box-shadow:0 0 12px var(--glow),0 2px 8px rgba(0,0,0,0.3)}
.ti.dimmed{opacity:.1;filter:blur(0.3px)}
.ti .fl{font-size:12px;line-height:1;flex-shrink:0}
.fi{display:inline-block;vertical-align:middle;border-radius:2px;object-fit:contain}

/* ===== STAGE (center detail panel) ===== */
.stage{grid-area:stage;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);border-radius:var(--r);background:var(--card)}
.stage-empty{text-align:center;color:var(--text);opacity:.2;
  transition:opacity .3s ease;user-select:none}
.stage-empty .icon{font-size:52px;display:block;margin-bottom:10px}
.stage-empty .txt{font-size:11px;line-height:1.6}
.stage-empty.hidden{opacity:0;pointer-events:none}
.dp{position:absolute;inset:0;padding:16px 20px;overflow-y:auto;
  opacity:0;transform:translateY(8px);transition:all .25s ease;pointer-events:none}
.dp.visible{opacity:1;transform:translateY(0);pointer-events:auto}

/* Detail content */
.dh{display:flex;align-items:center;gap:12px;margin-bottom:14px;
  padding-bottom:10px;border-bottom:1px solid var(--border)}
.dh .big{font-size:38px;line-height:1}
.dh .info{}
.dh .title{font-size:20px;font-weight:700;color:var(--text-hi);line-height:1.2}
.dh .sub{font-size:10px;color:var(--accent);margin-top:2px}
.ds{margin-bottom:14px}
.ds-title{font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--accent2);margin-bottom:8px}
.d-teams{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.d-chip{display:flex;align-items:center;gap:5px;padding:5px 10px;
  background:var(--card2);border:1px solid var(--border);border-radius:8px;
  font-size:11px;color:var(--text2);font-weight:600}
.d-chip .cf{font-size:18px}
.mc{display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  border-left:3px solid var(--city-color,var(--accent));
  margin-bottom:5px;transition:all .2s ease;
  animation:slideIn .3s ease both;animation-delay:calc(min(var(--i,0),10) * 0.035s)}
.mc:hover{border-color:var(--accent);background:rgba(139,92,246,0.04);transform:scale(1.01)}
.mc .mt{font-weight:600;color:var(--text-hi);display:flex;align-items:center;gap:4px;font-size:12px}
.mc .mf{font-size:15px}
.mc .vs{color:var(--accent);font-size:10px;margin:0 2px}
.mc .mm{margin-left:auto;display:flex;gap:10px;font-size:9px;color:var(--text);
  white-space:nowrap;flex-shrink:0}
.mc .mv{color:var(--city-color,var(--text2));font-weight:600}
.mc .md{min-width:40px}
/* Standings table */
.st{width:100%;border-collapse:collapse;font-size:10px;margin-bottom:4px}
.st th{text-align:left;font-size:8px;text-transform:uppercase;letter-spacing:.05em;
  color:var(--accent);padding:3px 6px;border-bottom:1px solid var(--border)}
.st th:not(:first-child):not(:nth-child(2)){text-align:center}
.st td{padding:4px 6px;border-bottom:1px solid rgba(26,26,48,0.5);color:var(--text2)}
.st td:not(:first-child):not(:nth-child(2)){text-align:center;font-family:'Courier New',monospace;font-size:9px}
.st td:first-child{font-size:9px;color:var(--text);opacity:.5}
.st td:nth-child(2){font-weight:600;color:var(--text-hi)}
.st .pts{color:var(--accent);font-weight:700}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ===== SIDEBAR (right) ===== */
.sidebar{grid-area:sidebar;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.groups-panel,.times-panel{background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:8px}
.groups-panel{flex:1;display:flex;flex-direction:column;overflow:visible}
.groups-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0 4px;
  align-content:space-evenly;height:100%}
.gi{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 4px;border-radius:8px;cursor:default;
  background:var(--card2);border:1px solid var(--border);
  transition:all .25s ease;gap:2px}
.gi .gl{font-size:11px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gi .gf{font-size:9px;line-height:1.2;text-align:center}
.gi:hover,.gi.highlighted{border-color:var(--accent);
  background:rgba(139,92,246,0.1);transform:scale(1.05);z-index:2;
  box-shadow:0 0 15px var(--glow)}
.gi.dimmed{opacity:.1;filter:blur(0.3px)}
.times-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
.tmi{display:flex;align-items:center;justify-content:center;
  padding:8px;border-radius:8px;cursor:default;
  background:var(--card2);border:1px solid var(--border);
  font-size:14px;font-weight:700;font-family:'Courier New',monospace;
  color:var(--text2);transition:all .25s ease;letter-spacing:.05em}
.tmi:hover,.tmi.highlighted{border-color:var(--accent);
  color:var(--text-hi);background:rgba(139,92,246,0.1);
  box-shadow:0 0 12px var(--glow)}
.tmi.dimmed{opacity:.1;filter:blur(0.3px)}

/* ===== VENUES BAR (bottom) ===== */
.venues-bar{grid-area:venues;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:6px 10px;display:flex;gap:4px;align-items:center;
  overflow:hidden;flex-wrap:wrap}
.vl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--accent);white-space:nowrap;flex-shrink:0;margin-right:4px}
.vi{display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:8px;cursor:default;
  border:1px solid var(--border);font-size:9px;color:var(--text2);
  border-left:3px solid var(--city-color,var(--border));
  transition:all .25s ease;white-space:nowrap;flex-shrink:0}
.vi:hover,.vi.highlighted{
  border-color:color-mix(in srgb,var(--city-color,var(--accent)) 50%,var(--border));
  color:var(--text-hi);background:rgba(139,92,246,0.04);
  box-shadow:0 0 8px color-mix(in srgb,var(--city-color,var(--accent)) 25%,transparent);
  transform:scale(1.06);z-index:2;position:relative}
.vi.dimmed{opacity:.1;filter:blur(0.3px)}
.vi .vn{font-weight:600;color:var(--city-color,var(--text2))}
.vi .vc{color:var(--text);font-size:8px}

/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Responsive */
@media(max-width:900px){
  .app{grid-template-columns:1fr 1fr;grid-template-rows:auto auto 1fr auto;
    grid-template-areas:"header header" "teams sidebar" "stage stage" "venues venues";
    overflow-y:auto;height:auto}
}
@media(max-width:600px){
  .app{grid-template-columns:1fr;grid-template-rows:auto auto auto 1fr auto;
    grid-template-areas:"header" "teams" "sidebar" "stage" "venues";
    overflow-y:auto;height:auto}
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>⚽ Copa do Mundo FIFA 2026 <span style="font-size:11px;font-weight:400;opacity:.5;margin-left:8px">by Aaron T.</span></h1>
    <div class="header-stats">
      <div class="hstat"><b>48</b><small>Seleções</small></div>
      <div class="hstat"><b>12</b><small>Grupos</small></div>
      <div class="hstat"><b>72</b><small>Jogos</small></div>
      <div class="hstat"><b>16</b><small>Estádios</small></div>
    </div>
    <span class="header-hint">Passe o mouse para explorar · Zero cliques</span>
  </div>

  <div class="teams-panel">
    <div class="panel-title">🏆 Seleções</div>
    <div class="teams-grid" id="teamsGrid"></div>
  </div>

  <div class="stage" id="stage">
    <div class="stage-empty" id="stageEmpty">
      <span class="icon">⚽</span>
      <div class="txt">Passe o mouse sobre qualquer elemento<br>para explorar a Copa do Mundo 2026</div>
    </div>
    <div class="dp" id="detailPanel"></div>
  </div>

  <div class="sidebar">
    <div class="groups-panel">
      <div class="panel-title">📋 Grupos</div>
      <div class="groups-grid" id="groupsGrid"></div>
    </div>
    <div class="times-panel">
      <div class="panel-title">🕐 Horários</div>
      <div class="times-grid" id="timesGrid"></div>
    </div>
  </div>

  <div class="venues-bar" id="venuesBar">
    <span class="vl">📍 Estádios</span>
  </div>
</div>

<script>
// ===================== DATA =====================
const GROUPS_DATA = {
  A:{teams:[{code:"USA",name:"EUA",flag:"🇺🇸"},{code:"URU",name:"Uruguai",flag:"🇺🇾"},{code:"SRB",name:"Sérvia",flag:"🇷🇸"},{code:"GHA",name:"Gana",flag:"🇬🇭"}]},
  B:{teams:[{code:"MEX",name:"México",flag:"🇲🇽"},{code:"COL",name:"Colômbia",flag:"🇨🇴"},{code:"AUT",name:"Áustria",flag:"🇦🇹"},{code:"CIV",name:"C.Marfim",flag:"🇨🇮"}]},
  C:{teams:[{code:"CAN",name:"Canadá",flag:"🇨🇦"},{code:"CRO",name:"Croácia",flag:"🇭🇷"},{code:"POL",name:"Polônia",flag:"🇵🇱"},{code:"ALG",name:"Argélia",flag:"🇩🇿"}]},
  D:{teams:[{code:"BRA",name:"Brasil",flag:"🇧🇷"},{code:"ITA",name:"Itália",flag:"🇮🇹"},{code:"SWE",name:"Suécia",flag:"🇸🇪"},{code:"QAT",name:"Catar",flag:"🇶🇦"}]},
  E:{teams:[{code:"ARG",name:"Argentina",flag:"🇦🇷"},{code:"DEN",name:"Dinamarca",flag:"🇩🇰"},{code:"UKR",name:"Ucrânia",flag:"🇺🇦"},{code:"UZB",name:"Uzbequistão",flag:"🇺🇿"}]},
  F:{teams:[{code:"FRA",name:"França",flag:"🇫🇷"},{code:"JPN",name:"Japão",flag:"🇯🇵"},{code:"NGA",name:"Nigéria",flag:"🇳🇬"},{code:"IDN",name:"Indonésia",flag:"🇮🇩"}]},
  G:{teams:[{code:"ESP",name:"Espanha",flag:"🇪🇸"},{code:"KOR",name:"Coreia",flag:"🇰🇷"},{code:"CMR",name:"Camarões",flag:"🇨🇲"},{code:"CRC",name:"Costa Rica",flag:"🇨🇷"}]},
  H:{teams:[{code:"ENG",name:"Inglaterra",flag:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{code:"MAR",name:"Marrocos",flag:"🇲🇦"},{code:"EGY",name:"Egito",flag:"🇪🇬"},{code:"HON",name:"Honduras",flag:"🇭🇳"}]},
  I:{teams:[{code:"POR",name:"Portugal",flag:"🇵🇹"},{code:"SEN",name:"Senegal",flag:"🇸🇳"},{code:"TUN",name:"Tunísia",flag:"🇹🇳"},{code:"PAN",name:"Panamá",flag:"🇵🇦"}]},
  J:{teams:[{code:"NED",name:"Holanda",flag:"🇳🇱"},{code:"ECU",name:"Equador",flag:"🇪🇨"},{code:"IRN",name:"Irã",flag:"🇮🇷"},{code:"JAM",name:"Jamaica",flag:"🇯🇲"}]},
  K:{teams:[{code:"BEL",name:"Bélgica",flag:"🇧🇪"},{code:"SUI",name:"Suíça",flag:"🇨🇭"},{code:"AUS",name:"Austrália",flag:"🇦🇺"},{code:"NZL",name:"N.Zelândia",flag:"🇳🇿"}]},
  L:{teams:[{code:"GER",name:"Alemanha",flag:"🇩🇪"},{code:"CHI",name:"Chile",flag:"🇨🇱"},{code:"KSA",name:"A.Saudita",flag:"🇸🇦"},{code:"PAR",name:"Paraguai",flag:"🇵🇾"}]}
};

const CITY_COLORS={"east-rutherford":"#3b82f6","los-angeles":"#a855f7","dallas":"#f97316",
  "miami":"#06b6d4","houston":"#ef4444","atlanta":"#10b981","filadelfia":"#6366f1",
  "seattle":"#14b8a6","foxborough":"#ec4899","kansas-city":"#f59e0b","santa-clara":"#c084fc",
  "cidade-do-mexico":"#22c55e","guadalajara":"#e11d48","monterrey":"#0ea5e9",
  "vancouver":"#dc2626","toronto":"#d946ef"};

const VENUES=[
  {id:"metlife",name:"MetLife Stadium",city:"East Rutherford",country:"EUA"},
  {id:"sofi",name:"SoFi Stadium",city:"Los Angeles",country:"EUA"},
  {id:"att",name:"AT&T Stadium",city:"Dallas",country:"EUA"},
  {id:"hardrock",name:"Hard Rock Stadium",city:"Miami",country:"EUA"},
  {id:"nrg",name:"NRG Stadium",city:"Houston",country:"EUA"},
  {id:"mercedesbenz",name:"Mercedes-Benz Stadium",city:"Atlanta",country:"EUA"},
  {id:"lincoln",name:"Lincoln Financial Field",city:"Filadélfia",country:"EUA"},
  {id:"lumen",name:"Lumen Field",city:"Seattle",country:"EUA"},
  {id:"gillette",name:"Gillette Stadium",city:"Foxborough",country:"EUA"},
  {id:"arrowhead",name:"Arrowhead Stadium",city:"Kansas City",country:"EUA"},
  {id:"levis",name:"Levi's Stadium",city:"Santa Clara",country:"EUA"},
  {id:"azteca",name:"Estádio Azteca",city:"Cidade do México",country:"MX"},
  {id:"akron",name:"Estádio Akron",city:"Guadalajara",country:"MX"},
  {id:"bbva",name:"Estádio BBVA",city:"Monterrey",country:"MX"},
  {id:"bcplace",name:"BC Place",city:"Vancouver",country:"CA"},
  {id:"bmo",name:"BMO Field",city:"Toronto",country:"CA"}
];

// Lookups
const TM={};const TG={};
Object.entries(GROUPS_DATA).forEach(([gk,g])=>{
  g.teams.forEach(t=>{TM[t.code]=t;TG[t.code]=gk;});
});

const ISO={USA:"us",URU:"uy",SRB:"rs",GHA:"gh",MEX:"mx",COL:"co",AUT:"at",CIV:"ci",
  CAN:"ca",CRO:"hr",POL:"pl",ALG:"dz",BRA:"br",ITA:"it",SWE:"se",QAT:"qa",
  ARG:"ar",DEN:"dk",UKR:"ua",UZB:"uz",FRA:"fr",JPN:"jp",NGA:"ng",IDN:"id",
  ESP:"es",KOR:"kr",CMR:"cm",CRC:"cr",ENG:"gb-eng",MAR:"ma",EGY:"eg",HON:"hn",
  POR:"pt",SEN:"sn",TUN:"tn",PAN:"pa",NED:"nl",ECU:"ec",IRN:"ir",JAM:"jm",
  BEL:"be",SUI:"ch",AUS:"au",NZL:"nz",GER:"de",CHI:"cl",KSA:"sa",PAR:"py"};
function fi(code,h){const w=h>20?80:40;
  return `<img class="fi" src="https://flagcdn.com/w${w}/${ISO[code]}.png" style="height:${h||14}px" alt="">`;}

function slug(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"-")}
function cc(cs){return CITY_COLORS[cs]||"#556"}
const MO=["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
function fd(d){const p=d.split("-");return parseInt(p[2])+" "+MO[parseInt(p[1])];}

// Generate matches
const MATCHES=[];
(function(){
  const sched=[
    {g:["A","B"],d:["2026-06-11","2026-06-17","2026-06-23"]},
    {g:["C","D"],d:["2026-06-12","2026-06-18","2026-06-24"]},
    {g:["E","F"],d:["2026-06-13","2026-06-19","2026-06-25"]},
    {g:["G","H"],d:["2026-06-14","2026-06-20","2026-06-26"]},
    {g:["I","J"],d:["2026-06-15","2026-06-21","2026-06-27"]},
    {g:["K","L"],d:["2026-06-16","2026-06-22","2026-06-28"]}
  ];
  const times=["13:00","16:00","19:00","22:00"];
  let vi=0;
  sched.forEach(s=>{s.g.forEach((gk,gi)=>{
    const t=GROUPS_DATA[gk].teams;
    [[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]].forEach((md,mdi)=>{
      md.forEach((p,pi)=>{
        const v=VENUES[vi%VENUES.length];vi++;
        MATCHES.push({group:gk,t1:t[p[0]].code,f1:t[p[0]].flag,t2:t[p[1]].code,f2:t[p[1]].flag,
          date:s.d[mdi],time:times[(gi*2+pi)%4],
          stad:v.id,stadName:v.name,city:v.city,cs:slug(v.city)});
      });
    });
  });});
})();

// ===================== RENDER PANELS =====================
function renderTeams(){
  const g=document.getElementById("teamsGrid");let h="";
  Object.entries(GROUPS_DATA).forEach(([gk,gr])=>{
    h+=`<span class="tgl" data-group="${gk}">${gk}</span>`;
    gr.teams.forEach(t=>{
      h+=`<div class="ti" data-team="${t.code}" data-group="${gk}">
        ${fi(t.code,12)}<span>${t.name}</span></div>`;
    });
  });
  g.innerHTML=h;
}

function renderGroups(){
  const g=document.getElementById("groupsGrid");let h="";
  Object.entries(GROUPS_DATA).forEach(([gk,gr])=>{
    h+=`<div class="gi" data-group="${gk}">
      <span class="gl">Grupo ${gk}</span>
      <span class="gf">${gr.teams.map(t=>fi(t.code,11)).join(" ")}</span>
    </div>`;
  });
  g.innerHTML=h;
}

function renderTimes(){
  const g=document.getElementById("timesGrid");
  const times=[...new Set(MATCHES.map(m=>m.time))].sort();
  let h="";
  times.forEach(t=>{h+=`<div class="tmi" data-time="${t}">${t}</div>`;});
  g.innerHTML=h;
}

function renderVenues(){
  const bar=document.getElementById("venuesBar");
  let h='<span class="vl">📍 Estádios</span>';
  VENUES.forEach(v=>{
    const cs=slug(v.city),col=cc(cs);
    h+=`<div class="vi" data-stad="${v.id}" data-city="${cs}" style="--city-color:${col}">
      <span class="vn">${v.name.replace(/ Stadium| Field/g,"")}</span>
      <span class="vc">${v.city}</span>
    </div>`;
  });
  bar.innerHTML=h;
}

// ===================== DETAIL PANEL =====================
const detailPanel=document.getElementById("detailPanel");
const stageEmpty=document.getElementById("stageEmpty");

function showDetail(html){
  detailPanel.innerHTML=html;detailPanel.scrollTop=0;
  detailPanel.classList.add("visible");stageEmpty.classList.add("hidden");
}
function hideDetail(){
  detailPanel.classList.remove("visible");stageEmpty.classList.remove("hidden");
}

function matchCardHTML(m,i,showGroup){
  const t1=TM[m.t1],t2=TM[m.t2],v=VENUES.find(x=>x.id===m.stad),c=cc(m.cs);
  return `<div class="mc" style="--city-color:${c};--i:${i}">
    <div class="mt">${fi(m.t1,15)} ${t1.name}
      <span class="vs">×</span>${t2.name} ${fi(m.t2,15)}</div>
    <div class="mm"><span class="md">${fd(m.date)}</span><span>${m.time}</span>
      <span class="mv">${v.name.replace(/ Stadium| Field/g,"")} · ${v.city}</span>
      ${showGroup?`<span>Grupo ${m.group}</span>`:""}</div>
  </div>`;
}

function teamDetail(code){
  const t=TM[code],gk=TG[code];
  const ms=MATCHES.filter(m=>m.t1===code||m.t2===code);
  let h=`<div class="dh"><span class="big">${fi(code,38)}</span><div class="info">
    <div class="title">${t.name}</div>
    <div class="sub">Grupo ${gk} · ${ms.length} jogos na fase de grupos</div>
  </div></div>`;
  h+='<div class="ds"><div class="ds-title">Adversários</div><div class="d-teams">';
  const opps=new Set();
  ms.forEach(m=>{opps.add(m.t1===code?m.t2:m.t1);});
  opps.forEach(c=>{const o=TM[c];
    h+=`<div class="d-chip">${fi(c,18)}${o.name}</div>`;
  });
  h+='</div></div>';
  h+='<div class="ds"><div class="ds-title">Jogos</div>';
  ms.forEach((m,i)=>{h+=matchCardHTML(m,i,false);});
  h+='</div>';
  showDetail(h);
}

function groupDetail(gk){
  const g=GROUPS_DATA[gk];
  const ms=MATCHES.filter(m=>m.group===gk);
  let h=`<div class="dh"><div class="info">
    <div class="title">Grupo ${gk}</div>
    <div class="sub">${g.teams.length} seleções · ${ms.length} jogos</div>
  </div></div>`;
  // Teams
  h+='<div class="ds"><div class="ds-title">Seleções</div><div class="d-teams">';
  g.teams.forEach(t=>{
    h+=`<div class="d-chip">${fi(t.code,18)}${t.name}</div>`;
  });
  h+='</div></div>';
  // Standings
  h+='<div class="ds"><div class="ds-title">Classificação</div>';
  h+='<table class="st"><tr><th>#</th><th>Seleção</th><th>J</th><th>V</th><th>E</th><th>D</th><th>Pts</th></tr>';
  g.teams.forEach((t,i)=>{
    h+=`<tr><td>${i+1}</td><td>${fi(t.code,12)} ${t.name}</td><td>0</td><td>0</td><td>0</td><td>0</td><td class="pts">0</td></tr>`;
  });
  h+='</table></div>';
  // Matches
  h+='<div class="ds"><div class="ds-title">Jogos</div>';
  ms.forEach((m,i)=>{h+=matchCardHTML(m,i,false);});
  h+='</div>';
  showDetail(h);
}

function venueDetail(stadId){
  const v=VENUES.find(x=>x.id===stadId);
  const cs=slug(v.city),c=cc(cs);
  const ms=MATCHES.filter(m=>m.stad===stadId);
  let h=`<div class="dh"><span class="big">🏟</span><div class="info">
    <div class="title">${v.name}</div>
    <div class="sub" style="color:${c}">${v.city}, ${v.country} · ${ms.length} jogos</div>
  </div></div>`;
  // Teams playing here
  const teams=new Set();ms.forEach(m=>{teams.add(m.t1);teams.add(m.t2);});
  h+='<div class="ds"><div class="ds-title">Seleções que jogam aqui</div><div class="d-teams">';
  teams.forEach(code=>{const t=TM[code];
    h+=`<div class="d-chip">${fi(code,18)}${t.name}</div>`;
  });
  h+='</div></div>';
  h+='<div class="ds"><div class="ds-title">Jogos</div>';
  ms.forEach((m,i)=>{h+=matchCardHTML(m,i,true);});
  h+='</div>';
  showDetail(h);
}

function timeDetail(time){
  const ms=MATCHES.filter(m=>m.time===time);
  let h=`<div class="dh"><span class="big">🕐</span><div class="info">
    <div class="title">${time}</div>
    <div class="sub">${ms.length} jogos neste horário</div>
  </div></div>`;
  // Group by date
  const byDate={};
  ms.forEach(m=>{if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});
  let i=0;
  Object.keys(byDate).sort().forEach(date=>{
    h+=`<div class="ds"><div class="ds-title">${fd(date)}</div>`;
    byDate[date].forEach(m=>{h+=matchCardHTML(m,i++,true);});
    h+='</div>';
  });
  showDetail(h);
}

// ===================== HIGHLIGHT SYSTEM =====================
function getRelated(type,val){
  let ms;
  if(type==="team") ms=MATCHES.filter(m=>m.t1===val||m.t2===val);
  else if(type==="group") ms=MATCHES.filter(m=>m.group===val);
  else if(type==="stad") ms=MATCHES.filter(m=>m.stad===val);
  else if(type==="city") ms=MATCHES.filter(m=>m.cs===val);
  else if(type==="time") ms=MATCHES.filter(m=>m.time===val);
  else ms=[];
  const r={teams:new Set(),groups:new Set(),times:new Set(),stads:new Set(),cities:new Set()};
  ms.forEach(m=>{
    r.teams.add(m.t1);r.teams.add(m.t2);r.groups.add(m.group);
    r.times.add(m.time);r.stads.add(m.stad);r.cities.add(m.cs);
  });
  return r;
}

function applyHL(r){
  document.querySelectorAll(".ti").forEach(el=>{
    const m=r.teams.has(el.dataset.team);
    el.classList.toggle("highlighted",m);el.classList.toggle("dimmed",!m);
  });
  document.querySelectorAll(".tgl").forEach(el=>{
    const m=r.groups.has(el.dataset.group);
    el.classList.toggle("highlighted",m);el.classList.toggle("dimmed",!m);
  });
  document.querySelectorAll(".gi").forEach(el=>{
    const m=r.groups.has(el.dataset.group);
    el.classList.toggle("highlighted",m);el.classList.toggle("dimmed",!m);
  });
  document.querySelectorAll(".tmi").forEach(el=>{
    const m=r.times.has(el.dataset.time);
    el.classList.toggle("highlighted",m);el.classList.toggle("dimmed",!m);
  });
  document.querySelectorAll(".vi").forEach(el=>{
    const m=r.stads.has(el.dataset.stad);
    el.classList.toggle("highlighted",m);el.classList.toggle("dimmed",!m);
  });
}

function clearHL(){
  document.querySelectorAll(".highlighted,.dimmed").forEach(el=>{
    el.classList.remove("highlighted","dimmed");
  });
}

// ===================== EVENTS =====================
let hideTimer=null;
function scheduleHide(){
  hideTimer=setTimeout(()=>{hideDetail();clearHL();},300);
}
function cancelHide(){
  if(hideTimer){clearTimeout(hideTimer);hideTimer=null;}
}

function setupEvents(){
  // Team items
  document.querySelectorAll(".ti").forEach(el=>{
    el.addEventListener("mouseenter",()=>{
      cancelHide();applyHL(getRelated("team",el.dataset.team));teamDetail(el.dataset.team);
    });
    el.addEventListener("mouseleave",scheduleHide);
  });
  // Group labels in teams panel
  document.querySelectorAll(".tgl").forEach(el=>{
    el.addEventListener("mouseenter",()=>{
      cancelHide();applyHL(getRelated("group",el.dataset.group));groupDetail(el.dataset.group);
    });
    el.addEventListener("mouseleave",scheduleHide);
  });
  // Group items in sidebar
  document.querySelectorAll(".gi").forEach(el=>{
    el.addEventListener("mouseenter",()=>{
      cancelHide();applyHL(getRelated("group",el.dataset.group));groupDetail(el.dataset.group);
    });
    el.addEventListener("mouseleave",scheduleHide);
  });
  // Time items
  document.querySelectorAll(".tmi").forEach(el=>{
    el.addEventListener("mouseenter",()=>{
      cancelHide();applyHL(getRelated("time",el.dataset.time));timeDetail(el.dataset.time);
    });
    el.addEventListener("mouseleave",scheduleHide);
  });
  // Venue items
  document.querySelectorAll(".vi").forEach(el=>{
    el.addEventListener("mouseenter",()=>{
      cancelHide();applyHL(getRelated("stad",el.dataset.stad));venueDetail(el.dataset.stad);
    });
    el.addEventListener("mouseleave",scheduleHide);
  });
  // Detail panel — keep alive when hovering
  detailPanel.addEventListener("mouseenter",cancelHide);
  detailPanel.addEventListener("mouseleave",scheduleHide);
}

// ===================== INIT =====================
renderTeams();
renderGroups();
renderTimes();
renderVenues();
setupEvents();
</script>
</body>
</html>
